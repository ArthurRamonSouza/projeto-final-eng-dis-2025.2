name: projeto-final-eng-dis

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile
    ports:
      - "${ENGINE_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5433/app}
      REDIS_QUEUE_URL: ${REDIS_QUEUE_URL:-redis://redis:6379/0}
      POOL_MIN: ${POOL_MIN:-3}
      POOL_TARGET: ${POOL_TARGET:-10}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_SEC: ${RATE_LIMIT_WINDOW_SEC:-60}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: ./services/ai-worker
    ports:
      - "${AI_WORKER_PORT:-8001}:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5433/app}
      REDIS_QUEUE_URL: ${REDIS_QUEUE_URL:-redis://redis:6379/0}
      AI_WORKER_INTERVAL_SEC: "${AI_WORKER_INTERVAL_SEC:-30}"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-"Sua API key aqui"}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
