name: CI

# Roda no GitHub em todo push, em todo PR e manualmente (aba Actions → CI → Run workflow).
# Não substitui hook local: o commit acontece na sua máquina; o Actions valida após o push.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engine
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: services/engine/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Format check (Prettier)
        run: pnpm run format:check

      - name: Build (TypeScript)
        run: pnpm run build

  shared:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: services/shared/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Format check (Prettier)
        run: pnpm run format:check

      - name: Build (TypeScript)
        run: pnpm run build

  ai-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ai-worker/requirements-dev.txt
      - name: Install dev tools
        run: pip install -r requirements-dev.txt
      - name: Lint (Ruff)
        run: ruff check .
      - name: Format check (Ruff)
        run: ruff format --check .

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build images
        run: docker compose build
